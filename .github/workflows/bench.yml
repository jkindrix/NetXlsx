name: Benchmarks

# Regression gate design (I-87). The pre-v2.0.1 gate was hollow: it compared
# against a cache that REFRESHED on every main push (a regression that landed
# on main became the next run's baseline) and the compare step was
# continue-on-error on main pushes — so "workflow green" never meant "no
# regression"; that's how the v2.0.0 14.5x bulk-write regression shipped
# undetected. The gate now:
#   * compares every run (push, PR, dispatch) against the COMMITTED
#     `benchmarks/ci-baseline/` briefs — no cache, no ratchet;
#   * can FAIL — there is no continue-on-error anywhere;
#   * treats a missing committed baseline as a loud FAILURE, not a silent
#     record-and-pass (the old "fresh path" was a second hollowness);
#   * refreshes the baseline only as a deliberate act: dispatch the workflow,
#     download the `bench-results-*` artifact from the run, commit its briefs
#     to `benchmarks/ci-baseline/` (see benchmarks/README.md).
# The committed `benchmarks/baseline/` (dev-local hardware) is a separate
# reference for local pre-PR checks — never compared against CI runs.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - '.github/workflows/bench.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmarks/**'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - '.github/workflows/bench.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    name: benchmarks + regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install libgdiplus + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdiplus fonts-dejavu-core fontconfig

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Restore (dotnet)
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run benchmarks
        run: |
          dotnet run --project benchmarks/NetXlsx.Benchmarks --configuration Release --no-build --framework net10.0 -- --filter "*Benchmarks*" --exporters JSON
          mkdir -p benchmarks/current
          cp BenchmarkDotNet.Artifacts/results/*-report-brief.json benchmarks/current/
          ls -la benchmarks/current/

      # The gate. Compares against the COMMITTED CI baseline; a missing
      # baseline fails loud (bootstrap: dispatch a run, commit its artifact
      # briefs to benchmarks/ci-baseline/). Threshold 25%: the committed-
      # baseline comparison spans different runner instances, which adds
      # variance over the design DoD's 10% — 25% still fails decisively on
      # the regression class that matters while not crying wolf on runner
      # jitter. If a run looks like pure noise (test-stack-only bumps),
      # re-run before treating it as real.
      - name: Compare against committed CI baseline
        run: |
          if [ -z "$(ls -A benchmarks/ci-baseline 2>/dev/null)" ]; then
            echo "::error::No committed CI baseline found at benchmarks/ci-baseline/."
            echo "::error::Seed it deliberately: dispatch this workflow, download the bench-results artifact, commit its briefs to benchmarks/ci-baseline/."
            exit 1
          fi
          python3 benchmarks/compare-bench.py benchmarks/current benchmarks/ci-baseline --threshold 25

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bench-results-${{ github.run_number }}
          path: benchmarks/current/
          if-no-files-found: error
