name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # MinVer needs full history to resolve the version from tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install libgdiplus + DejaVu fonts (Linux only, required for IColumn.AutoSize)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdiplus fonts-dejavu-core fontconfig

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Test
        # Excludes Category=HeadlessNoFonts tests, which require a known
        # font-less environment (the dedicated headless-no-fonts job below).
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=minimal" --collect:"XPlat Code Coverage" --filter "Category!=HeadlessNoFonts"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: '**/TestResults/**/coverage.cobertura.xml'
          if-no-files-found: ignore

  # Headless AutoSize gate, v2.0.0 contract (decision I-84, superseding I3):
  # on an Ubuntu host with all font packages purged, AutoSize for an
  # embedded-metrics font must SUCCEED with the same deterministic width as
  # everywhere else (the embedded numeric tables need no installed fonts),
  # and a font outside the embedded set must throw MissingFontException
  # naming the font. Without this gate, a regression that reintroduces an
  # environment-dependent measurement path wouldn't surface until a user's
  # container deployment reports wrong widths.
  headless-no-fonts:
    name: headless-no-fonts (AutoSize I-84 embedded-metrics gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Purge all fonts + libgdiplus from the runner image
        # ubuntu-latest ships with a font stack; remove it so the test
        # environment matches a minimal container deployment.
        run: |
          sudo apt-get remove -y --purge 'fonts-*' 'libgdiplus*' 'libcairo*' 'fontconfig*' || true
          sudo apt-get autoremove -y
          sudo rm -rf /usr/share/fonts /usr/local/share/fonts /etc/fonts
          # Verify the purge: zero font files anywhere accessible to apps
          font_count=$(find /usr/share /usr/local/share /etc -name '*.ttf' -o -name '*.otf' 2>/dev/null | wc -l)
          echo "Font files remaining: $font_count"
          if [ "$font_count" -gt 0 ]; then
            echo "::warning::Expected 0 font files after purge, found $font_count. The no-fonts half of the I-84 gate is weakened."
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=true

      - name: Run only the HeadlessNoFonts-trait tests
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=normal" --filter "Category=HeadlessNoFonts"
